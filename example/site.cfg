# Example site for the SCC demo.
# Run with:
# moon run cmd/main -- ./example/content ./example/dist --config ./example/site.cfg
#
# Demonstrated keys:
# - title: site name used in templates via {{site_name}}
# - base_url: canonical URLs, RSS, sitemap, JSON-LD
# - description / og_image: site metadata defaults
# - templates_dir / static_dir: custom project layout outside the content root defaults
# - root_page: copies content/pages/home.md to /
# - page_size: global pagination fallback
# - feed_limit / search_index_file: generated output knobs
# - [[collections]]: inline collection config with schema, template, and page_size

title = Lattice Example Site
base_url = https://example.lattice.test
description = Reference site covering drafts, pagination, tags, feeds, sitemap, JSON-LD, and template composition.
og_image = https://example.lattice.test/static/social-card.png
templates_dir = example/templates
static_dir = static
root_page = home
page_size = 4
feed_limit = 10
search_index_file = search-index.json

[[collections]]
# Posts demonstrate YAML frontmatter, tags, RSS, sitemap entries, JSON-LD,
# pagination, syntax highlighting, footnotes, TOC, and draft exclusion.
name = posts
dir = example/content/posts
schema = title:String,date:Date,description:String,tags:Optional[Array[String]],author:String,draft:Optional[Bool]
template = example/templates/page.html
page_size = 2

[[collections]]
# Pages provide a second collection and the root landing page.
name = pages
dir = example/content/pages
schema = title:String,description:String
template = example/templates/page.html
